<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡皮巴拉的成語故事屋</title>
    <style>
        /* 卡皮巴拉護眼大地色系 */
        :root {
            --capybara-dark: #6D4C41;    /* 深棕色：文字與主標題 */
            --capybara-medium: #8D6E63;  /* 中棕色：按鈕與次強調色 */
            --capybara-light: #D7CCC8;   /* 淺灰棕：引言背景 */
            --bg-color: #F5F5DC;         /* 溫暖米色：網頁背景 */
            --leaf-green: #81C784;       /* 柔和草綠：強調與互動區 */
            --leaf-dark: #388E3C;        /* 深綠色：注音與邊框 */
            --white: #FFFFFF;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            color: var(--capybara-dark);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(109, 76, 65, 0.15);
            padding: 40px;
            border-top: 15px solid var(--capybara-medium);
            position: relative;
        }

        /* 頂部控制區 */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px dashed var(--capybara-light);
            padding-bottom: 15px;
        }

        .app-title {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--capybara-medium);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background-color: var(--leaf-green);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(129, 199, 132, 0.4);
        }

        .refresh-btn:hover {
            background-color: var(--leaf-dark);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        /* 內容區段 */
        h1 {
            color: var(--capybara-dark);
            text-align: center;
            font-size: 2.8em;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }

        .pronunciation {
            text-align: center;
            font-size: 1.3em;
            color: var(--leaf-dark);
            margin-bottom: 30px;
            font-weight: bold;
            background-color: #E8F5E9;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        h2 {
            color: var(--capybara-dark);
            font-size: 1.4em;
            margin-top: 30px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '🦦';
            margin-right: 10px;
            font-size: 1.2em;
        }

        .meaning {
            font-size: 1.15em;
            padding: 0 10px;
        }

        .quote-box {
            background-color: var(--capybara-light);
            border-left: 6px solid var(--capybara-medium);
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            margin: 20px 0;
            color: #4E342E;
        }

        .source-title {
            font-weight: bold;
            color: var(--capybara-dark);
            margin-bottom: 5px;
            display: block;
        }

        .story-content {
            font-size: 1.15em;
            text-align: justify;
            padding: 0 10px;
        }

        .story-content p {
            margin-bottom: 15px;
        }

        /* 互動問答區 */
        .interactive-box {
            background-color: #F1F8E9;
            border: 2px solid var(--leaf-green);
            border-radius: 16px;
            padding: 25px;
            margin-top: 40px;
        }

        .interactive-box h2::before {
            content: '💡';
        }

        .answer-btn {
            background-color: var(--capybara-medium);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
            margin: 20px auto 0;
            font-weight: bold;
        }

        .answer-btn:hover {
            background-color: var(--capybara-dark);
        }

        .answer-text {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: var(--white);
            border-radius: 12px;
            border-left: 5px solid var(--leaf-green);
            color: var(--capybara-dark);
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 底部資訊 */
        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.9em;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .signature {
            font-weight: bold;
            color: var(--capybara-medium);
            margin-bottom: 5px;
        }

        /* 淡入動畫 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2.2em; }
            .header-controls { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header-controls">
        <div class="app-title">🍊 卡皮巴拉的成語故事屋</div>
        <button class="refresh-btn" onclick="loadRandomStory()">
            <span>✨ 換一個故事</span>
        </button>
    </div>

    <!-- 這一層 div id="storyContent" 就是剛剛報錯找不到的關鍵 -->
    <div id="storyContent" class="fade-in">
        <h1 id="idiomTitle">載入中...</h1>
        <div class="pronunciation" id="idiomPinyin">...</div>

        <h2>水豚老師來解釋</h2>
        <div class="meaning" id="idiomMeaning"></div>

        <h2>典故在哪裡？</h2>
        <div class="quote-box">
            <span class="source-title" id="idiomSource"></span>
            <span id="idiomQuote"></span>
        </div>

        <h2>歷史故事時間</h2>
        <div class="story-content" id="idiomStory"></div>

        <div class="interactive-box">
            <h2>生活隨堂考（想一想，再點擊解答）</h2>
            <p id="idiomQuestion"></p>
            <button class="answer-btn" id="toggleAnswerBtn" onclick="toggleAnswer()">點我看水豚老師的想法</button>
            <div id="answerText" class="answer-text"></div>
        </div>
    </div>

    <div class="footer">
        <div class="signature">【史一良藥師監製 / 史一良印】</div>
        <div>程式版本：v1.5.0 | 製作日期：2026-06-25</div>
    </div>
</div>

<script>
    // 成語故事資料庫 (第四季全新 30 個經典成語，保證完全不重複，含醫藥專題)
    const storyDatabase = [
        {
            title: "入木三分",
            pinyin: "rù mù sān fēn (ㄖㄨˋ ㄇㄨˋ ㄙㄢ ㄈㄣ)",
            meaning: "形容書法筆力強勁。後也比喻見解、議論十分深刻。",
            source: "出處：唐朝 張懷瓘《書斷》",
            quote: "「王羲之書祝版，工人削之，筆入木三分。」",
            story: `
                <p>晉代有一位被稱為「書聖」的大書法家，名叫王羲之。他寫字非常認真，功力深厚。</p>
                <p>有一次，皇帝要舉行盛大的祭祀大典，需要把祝禱的文字寫在一塊木板上，再請工匠刻出來。這個重要的任務就交給了王羲之。</p>
                <p>王羲之拿起毛筆，在木板上寫下了剛勁有力的字體。等墨水乾了之後，雕刻的工匠拿著刀準備沿著字跡雕刻。沒想到，工匠一刀削下去，發現黑色的墨跡竟然還在！</p>
                <p>工匠連續削了木板三分深（大約一公分），才終於看不到墨跡。原來王羲之寫字的力量太大，墨水竟然穿透了木頭，深深地印了進去。大家都驚呼他的書法真是「入木三分」！</p>
            `,
            question: "如果老師誇獎你寫的讀書心得「入木三分」，代表什麼意思呢？",
            answer: "🍊 水豚老師說：這代表老師覺得你的文章寫得非常深刻，不僅看懂了故事的表面，還看透了最深層的道理喔！"
        },
        {
            title: "一箭雙鵰",
            pinyin: "yí jiàn shuāng diāo (ㄧˊ ㄐㄧㄢˋ ㄕㄨㄤ ㄉㄧㄠ)",
            meaning: "射一枝箭，打中兩隻鵰。比喻做一件事，同時達到兩個目的。",
            source: "出處：唐朝《北史·長孫晟傳》",
            quote: "「嘗有二鵰飛而爭肉，因以箭兩隻與晟，請射取之。晟馳馬，一發而雙鵰下。」",
            story: `
                <p>南北朝時期，有一位名叫長孫晟的將軍。他不僅聰明，射箭的技術更是天下無敵。</p>
                <p>有一次，他出使到北方的突厥國。突厥國王帶著他一起去大草原上打獵。這時，天上突然傳來響亮的鳥叫聲，大家抬頭一看，原來是兩隻巨大的「鵰」（一種兇猛的大老鷹），正盤旋在半空中，激烈地搶奪一塊肉。</p>
                <p>突厥國王想測試長孫晟的本事，就遞給他兩支箭，請他把大鵰射下來。</p>
                <p>長孫晟接過箭，卻只抽出其中一支。他騎著馬飛奔，拉滿了弓，瞄準天上。「嗖」的一聲，箭飛了出去，竟然不偏不倚，一箭直接把兩隻正在搶肉的大鵰一起串了起來，掉在地上！在場的人全看傻了眼。</p>
            `,
            question: "如果你為了幫媽媽做家事而自告奮勇去倒垃圾，結果剛好在垃圾場旁邊撿到十塊錢。這種幸運的情況像什麼成語？",
            answer: "🍊 水豚老師說：這就是「一箭雙鵰」（一石二鳥）！做了一件好事，同時還意外達成了另一個好處，真是太幸運啦。"
        },
        {

            source: "出處：五代 前蜀《靈怪錄》",
            quote: "「徐視其衣並無縫，翰問之，謂翰曰：『天衣本非針線為也。』」",
            story: `
                <p>傳說在唐朝時，有一個名叫郭翰的人。在一個夏天的晚上，他在院子裡乘涼，突然一陣香氣飄來，一位美麗的仙女從天上飛了下來，原來她是天上的織女。</p>
                <p>郭翰覺得很神奇，就和仙女聊起天來。聊天時，郭翰仔細觀察仙女身上穿的漂亮衣服，發現了一件很奇怪的事情。</p>
                <p>他問仙女：「為什麼妳的衣服上，連一條針線縫過的痕跡都沒有呢？」</p>
                <p>仙女笑著回答：「我是天上的神仙呀！神仙穿的『天衣』，本來就不是用人間的針線縫出來的，當然沒有任何接縫囉！」後來，人們就用這個故事來形容計畫或作品非常完美，找不到任何缺點。</p>

            question: "如果班上同學一起策劃了一個幫老師慶生的驚喜派對，從頭到尾都沒有被老師發現任何破綻。這個計畫可以說是什麼？",
            answer: "🍊 水豚老師說：可以說這個驚喜計畫真是「天衣無縫」！代表大家合作得太完美了，沒有留下任何蛛絲馬跡。"
        },
        {
            title: "八仙過海",
            pinyin: "bā xiān guò hǎi (ㄅㄚ ㄒㄧㄢ ㄍㄨㄛˋ ㄏㄞˇ)",
            meaning: "（常接：各顯神通）。比喻各自拿出本領或辦法，互相競賽。",
            source: "出處：明朝 吳元泰《八仙出處東遊記》",
            quote: "「鐵拐曰：『乘雲而過，不見仙家本事。試各以一物投之水面，乘所投之物而過水，如何？』」",
            story: `
                <p>傳說中有八位法力高強的神仙，分別是：鐵拐李、漢鍾離、張果老、呂洞賓、何仙姑、藍采和、韓湘子、曹國舅。</p>
                <p>有一天，他們參加完王母娘娘的蟠桃大會，準備一起回家。路過波濤洶湧的東海時，鐵拐李提議說：「我們都是神仙，如果像凡人一樣坐船過海就太無聊了。不如大家都不准坐船，各自拿出自己的法寶過海，看看誰比較厲害吧！」</p>
                <p>大家聽了紛紛叫好。於是鐵拐李把拐杖丟進海裡當船；呂洞賓踩著寶劍飛過去；何仙姑坐著荷花飄過去；張果老則倒騎著他的紙驢踩著水面走過去。</p>
                <p>八位神仙各自大顯神威，順利度過了東海。這就是「八仙過海，各顯神通」的故事。</p>
            `,
            question: "學校舉辦才藝表演，有的人變魔術，有的人跳街舞，有的人拉小提琴。這種熱鬧的比賽場面就像什麼成語？",
            answer: "🍊 水豚老師說：這就像是「八仙過海，各顯神通」！每個人都拿出自己最拿手的絕活來表現，真是太精彩了。"
        },
        {
            title: "管中窺豹",
            pinyin: "guǎn zhōng kuī bào (ㄍㄨㄢˇ ㄓㄨㄥ ㄎㄨㄟ ㄅㄠˋ)",
            meaning: "（常接：可見一斑）。從竹管的小孔裡看豹，只看到豹身上的一塊斑紋。比喻只看到事物的一部分，未能看到全貌。",
            source: "出處：南朝《世說新語·方正》",
            quote: "「王子敬數歲時，嘗看諸門生樗蒲... 門生曰：『此郎亦管中窺豹，時見一斑。』」",
            story: `
                <p>東晉大書法家王羲之有個兒子叫王獻之，他小時候非常聰明。</p>
                <p>有一天，王獻之看到爸爸的學生們正在玩一種叫「樗蒲（類似擲骰子）」的遊戲。他在旁邊看了一會兒，忍不住插嘴說：「你這步棋走錯了，快要輸囉！」</p>
                <p>學生們看他只是個小孩子，覺得他根本不懂，就笑著對他說：「你這個小少爺啊，就像是『從竹管子裡面看豹』一樣，只看到了豹身上的一個小斑點，就以為自己看清了整隻豹呢！」</p>
                <p>王獻之聽了很生氣，覺得大人看不起他，一氣之下就把袖子甩開走掉了。不過這個詞後來就被用來形容看事情不夠全面了。</p>

            question: "如果你只看了一本書的封面和第一頁，就告訴別人這本書不好看。你的評價是不是有點「管中窺豹」？",

        {
            title: "世外桃源",
            pinyin: "shì wài táo yuán (ㄕˋ ㄨㄞˋ ㄊㄠˊ ㄩㄢˊ)",

            source: "出處：晉朝 陶淵明《桃花源記》",
            quote: "「忽逢桃花林，夾岸數百步，中無雜樹，芳草鮮美，落英繽紛。」",
            story: `
                <p>晉朝時有一位詩人叫陶淵明，他寫了一個很美的故事：</p>

                <p>村民說他們的祖先為了躲避秦朝的戰亂才逃到這裡，從此再也沒出去過，連現在是什麼朝代都不知道。漁夫回家後，把這件事告訴了太守，可是當他們再去找這個沒有戰爭、充滿歡樂的「桃花源」時，卻再也找不到了。</p>

            question: "如果你發現圖書館的角落有一個很舒服的沙發，沒人打擾，可以安靜地看一整天的漫畫。這個角落就像是你的什麼？",
            answer: "🍊 水豚老師說：這個角落就像是你的「世外桃源」！在這個忙碌的世界裡，能找到一個讓自己放鬆、安心的小天地，是非常幸運的事喔。"
        },
        {
            title: "夜郎自大",
            pinyin: "yè láng zì dà (ㄧㄝˋ ㄌㄤˊ ㄗˋ ㄉㄚˋ)",
            meaning: "比喻人不自量力，妄自尊大。",
            source: "出處：西漢《史記·西南夷列傳》",
            quote: "「滇王與漢使者言曰：『漢孰與我大？』及夜郎侯亦然。」",
            story: `
                <p>在漢朝的時候，西南方有一個很小的國家叫做「夜郎國」。夜郎國四面都被高山包圍，交通很不方便，所以那裡的人從來沒有去過外面的世界，以為天下就只有他們國家這麼大。</p>

    let currentIndex = -1;

    function loadRandomStory() {
        // 確保不會連續抽到同一個故事
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * storyDatabase.length);
        } while (newIndex === currentIndex && storyDatabase.length > 1);
        
        currentIndex = newIndex;
        const story = storyDatabase[currentIndex];

        // 重新觸發淡入動畫
        const contentDiv = document.getElementById('storyContent');
        contentDiv.classList.remove('fade-in');
        void contentDiv.offsetWidth; // 觸發重繪 (Reflow)
        contentDiv.classList.add('fade-in');

        // 更新 DOM 內容
        document.getElementById('idiomTitle').textContent = story.title;
        document.getElementById('idiomPinyin').textContent = story.pinyin;
        document.getElementById('idiomMeaning').textContent = story.meaning;
        document.getElementById('idiomSource').textContent = story.source;
        document.getElementById('idiomQuote').textContent = story.quote;
        document.getElementById('idiomStory').innerHTML = story.story;
        document.getElementById('idiomQuestion').textContent = story.question;
        document.getElementById('answerText').innerHTML = story.answer;

        // 重置解答區的顯示狀態
        document.getElementById('answerText').style.display = 'none';
        document.getElementById('toggleAnswerBtn').textContent = '點我看水豚老師的想法';
    }

    // 切換解答顯示的函數
    function toggleAnswer() {
        const answerDiv = document.getElementById("answerText");
        const btn = document.getElementById("toggleAnswerBtn");
        
        if (answerDiv.style.display === "none" || answerDiv.style.display === "") {
            answerDiv.style.display = "block";
            btn.textContent = "收起解答 🙈";
        } else {
            answerDiv.style.display = "none";
            btn.textContent = "點我看水豚老師的想法 💡";
        }
    }

    window.onload = loadRandomStory;
</script>
